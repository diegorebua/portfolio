version: '3.8'

services:
  backend:
    build: ./backend
    expose:
      - "3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "7000:5173"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
