version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "7000:5173"
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
