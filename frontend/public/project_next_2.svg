<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a16" />
      <stop offset="50%" stop-color="#18112a" />
      <stop offset="100%" stop-color="#140f2a" />
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="blurGlow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)" />

  <!-- Glowing Orb Background Effect -->
  <circle cx="180" cy="150" r="170" fill="url(#glow2)" filter="url(#blurGlow2)" />
  <circle cx="650" cy="380" r="160" fill="#6d28d9" opacity="0.35" filter="url(#blurGlow2)" />

  <!-- Grid Lines -->
  <g stroke="#2e1065" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Abstract SaaS Nodes & Cloud Network -->
  <g transform="translate(140, 100)">
    <rect x="0" y="0" width="520" height="300" rx="24" fill="#131022" stroke="#4c1d95" stroke-width="2" opacity="0.9" />
    <!-- Architecture Diagram Nodes -->
    <rect x="40" y="50" width="120" height="80" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" />
    <circle cx="100" cy="80" r="14" fill="#8b5cf6" opacity="0.3" />
    <rect x="65" y="106" width="70" height="8" rx="4" fill="#c4b5fd" />

    <rect x="200" y="50" width="120" height="80" rx="12" fill="#164e63" stroke="#06b6d4" stroke-width="1.5" />
    <circle cx="260" cy="80" r="14" fill="#06b6d4" opacity="0.3" />
    <rect x="225" y="106" width="70" height="8" rx="4" fill="#67e8f9" />

    <rect x="360" y="50" width="120" height="80" rx="12" fill="#312e81" stroke="#6366f1" stroke-width="1.5" />
    <circle cx="420" cy="80" r="14" fill="#6366f1" opacity="0.3" />
    <rect x="385" y="106" width="70" height="8" rx="4" fill="#a5b4fc" />

    <!-- Connecting lines -->
    <path d="M 160 90 L 200 90 M 320 90 L 360 90" stroke="#a855f7" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Bottom Dashboard Box -->
    <rect x="40" y="165" width="440" height="100" rx="14" fill="#18182f" stroke="#3b0764" stroke-width="1.5" />
    <!-- Progress Bars -->
    <rect x="65" y="195" width="390" height="12" rx="6" fill="#2e1065" />
    <rect x="65" y="195" width="280" height="12" rx="6" fill="url(#accent2)" />

    <rect x="65" y="225" width="390" height="12" rx="6" fill="#2e1065" />
    <rect x="65" y="225" width="190" height="12" rx="6" fill="#06b6d4" />
  </g>

  <!-- Overlay Text Badge -->
  <g transform="translate(400, 250)">
    <rect x="-190" y="-36" width="380" height="72" rx="36" fill="#131022" stroke="#8b5cf6" stroke-width="2" opacity="0.95" />
    <text x="0" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
      PRÓXIMOS PROJETOS A CAMINHO
    </text>
  </g>
</svg>
