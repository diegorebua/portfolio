<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)" />

  <!-- Glowing Orb Background Effect -->
  <circle cx="650" cy="150" r="180" fill="url(#glow1)" filter="url(#blurGlow)" />
  <circle cx="150" cy="400" r="140" fill="#1e3a8a" opacity="0.4" filter="url(#blurGlow)" />

  <!-- Grid Lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Abstract UI Mockup Elements -->
  <rect x="80" y="80" width="640" height="340" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2" opacity="0.85" />
  <rect x="80" y="80" width="640" height="44" rx="16" fill="#1e293b" />
  <!-- Window Controls -->
  <circle cx="110" cy="102" r="6" fill="#ef4444" opacity="0.8" />
  <circle cx="130" cy="102" r="6" fill="#eab308" opacity="0.8" />
  <circle cx="150" cy="102" r="6" fill="#22c55e" opacity="0.8" />
  <rect x="180" y="96" width="200" height="12" rx="6" fill="#334155" />

  <!-- Inner Cards/Charts Mockup -->
  <rect x="116" y="148" width="180" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" />
  <circle cx="150" cy="180" r="16" fill="#3b82f6" opacity="0.2" />
  <rect x="180" y="174" width="80" height="10" rx="5" fill="#60a5fa" />
  <rect x="136" y="214" width="140" height="8" rx="4" fill="#475569" />

  <rect x="312" y="148" width="180" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <rect x="332" y="174" width="100" height="10" rx="5" fill="#94a3b8" />
  <rect x="332" y="214" width="140" height="8" rx="4" fill="#475569" />

  <rect x="508" y="148" width="176" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <rect x="528" y="174" width="90" height="10" rx="5" fill="#94a3b8" />
  <rect x="528" y="214" width="130" height="8" rx="4" fill="#475569" />

  <rect x="116" y="264" width="568" height="132" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1" />
  <path d="M 140 360 Q 220 300 300 330 T 460 290 T 660 340" fill="none" stroke="url(#accent1)" stroke-width="4" stroke-linecap="round" />
  <circle cx="300" cy="330" r="6" fill="#60a5fa" />
  <circle cx="460" cy="290" r="6" fill="#60a5fa" />

  <!-- Overlay Text Badge -->
  <g transform="translate(400, 250)">
    <rect x="-190" y="-36" width="380" height="72" rx="36" fill="#0f172a" stroke="#3b82f6" stroke-width="2" opacity="0.95" />
    <text x="0" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
      PRÓXIMOS PROJETOS A CAMINHO
    </text>
  </g>
</svg>
