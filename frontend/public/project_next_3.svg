<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05131a" />
      <stop offset="50%" stop-color="#0a1f2c" />
      <stop offset="100%" stop-color="#041219" />
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="blurGlow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg3)" />

  <!-- Glowing Orb Background Effect -->
  <circle cx="620" cy="350" r="170" fill="url(#glow3)" filter="url(#blurGlow3)" />
  <circle cx="180" cy="150" r="150" fill="#0369a1" opacity="0.35" filter="url(#blurGlow3)" />

  <!-- Grid Lines -->
  <g stroke="#0c4a6e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Abstract Terminal/API Mockup -->
  <rect x="100" y="80" width="600" height="340" rx="16" fill="#08141f" stroke="#0284c7" stroke-width="2" opacity="0.9" />
  <rect x="100" y="80" width="600" height="44" rx="16" fill="#0f2942" />
  <!-- Window Controls -->
  <circle cx="130" cy="102" r="6" fill="#ef4444" opacity="0.8" />
  <circle cx="150" cy="102" r="6" fill="#eab308" opacity="0.8" />
  <circle cx="170" cy="102" r="6" fill="#10b981" opacity="0.8" />
  <text x="200" y="107" font-family="monospace" font-size="13" fill="#7dd3fc">REST API — Spring Boot Service</text>

  <!-- Terminal Code lines -->
  <g transform="translate(140, 150)">
    <rect x="0" y="0" width="120" height="18" rx="4" fill="#0284c7" opacity="0.8" />
    <rect x="130" y="2" width="220" height="14" rx="4" fill="#38bdf8" />
    
    <rect x="20" y="36" width="80" height="14" rx="4" fill="#10b981" />
    <rect x="110" y="36" width="160" height="14" rx="4" fill="#94a3b8" />

    <rect x="40" y="70" width="140" height="14" rx="4" fill="#34d399" />
    <rect x="190" y="70" width="200" height="14" rx="4" fill="#64748b" />

    <rect x="40" y="104" width="100" height="14" rx="4" fill="#38bdf8" />
    <rect x="150" y="104" width="180" height="14" rx="4" fill="#cbd5e1" />

    <!-- Status Box -->
    <rect x="0" y="150" width="520" height="80" rx="10" fill="#0f2942" stroke="#10b981" stroke-width="1" />
    <circle cx="30" cy="190" r="8" fill="#10b981" />
    <rect x="50" y="184" width="200" height="12" rx="6" fill="#e2e8f0" />
    <rect x="260" y="184" width="100" height="12" rx="6" fill="#34d399" />
  </g>

  <!-- Overlay Text Badge -->
  <g transform="translate(400, 250)">
    <rect x="-190" y="-36" width="380" height="72" rx="36" fill="#08141f" stroke="#10b981" stroke-width="2" opacity="0.95" />
    <text x="0" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
      PRÓXIMOS PROJETOS A CAMINHO
    </text>
  </g>
</svg>
